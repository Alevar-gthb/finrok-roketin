name: Deploy FINROK

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Supabase Migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
